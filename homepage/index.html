<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>평</title>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #e4e0f2;
  color: #2b2b2b;
  min-height: 100vh;
}

.page {
  position: relative;
  overflow: hidden;
  min-height: 100vh;
}

.vc-wrap {
  max-width: 740px;
  margin: 0 auto;
  padding: 100px 60px 100px;
  position: relative;
  z-index: 1;
}

.vc-name {
  font-family: 'Schibsted Grotesk', sans-serif;
  font-size: 88px;
  font-weight: 700;
  color: #2b2b2b;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 10px;
}

.vc-tagline {
  font-size: 14px;
  color: rgba(30,20,60,0.45);
  letter-spacing: 0.02em;
  margin-bottom: 72px;
}

.vc-section { margin-bottom: 48px; }

.vc-section-title {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(30,20,60,0.38);
  margin-bottom: 16px;
}

.vc-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.vc-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 44px;
  height: 128px;
  border-radius: 4px;
  text-decoration: none;
  color: rgba(30,20,60,0.82);
  font-size: 40px;
  font-family: 'Schibsted Grotesk', sans-serif;
  font-weight: 700;
  letter-spacing: -0.03em;
  background: rgba(12,8,35,0.07);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}
.vc-item:hover {
  background: rgba(12,8,35,0.18);
  border-color: rgba(255,255,255,0.32);
  color: rgba(20,10,50,0.95);
}
.vc-item-arr {
  color: rgba(30,20,60,0.22);
  font-size: 18px;
  transition: color 0.18s, transform 0.18s;
}
.vc-item:hover .vc-item-arr { color: #5b7ea8; transform: translateX(4px); }

.vc-sns-banner {
  position: relative;
  border-radius: 4px;
  overflow: hidden;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  text-decoration: none;
  cursor: pointer;
  background: rgba(12,8,35,0.07);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  transition: background 0.25s, border-color 0.25s;
}
.vc-sns-banner::after {
  content: '→';
  font-size: 18px;
  color: rgba(30,20,60,0.22);
  transition: color 0.18s, transform 0.18s;
}
.vc-sns-banner:hover {
  background: rgba(12,8,35,0.18);
  border-color: rgba(255,255,255,0.32);
}
.vc-sns-banner:hover::after { color: #5b7ea8; transform: translateX(4px); }
.vc-sns-banner.banner-a { border-color: rgba(80,130,210,0.18); }
.vc-sns-banner.banner-b { border-color: rgba(130,70,210,0.18); }
.vc-sns-banner.banner-a:hover { border-color: rgba(80,130,210,0.38); }
.vc-sns-banner.banner-b:hover { border-color: rgba(130,70,210,0.38); }

.vc-banner-text {
  font-family: 'Schibsted Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: rgba(30,20,60,0.75);
}

@media (max-width: 768px) {
  .vc-wrap { padding: 80px 28px 80px; }
  .vc-name { font-size: 80px; }
  .vc-tagline { font-size: 13px; }
  .vc-item { height: 96px; padding: 0 28px; font-size: 30px; }
  .vc-item-arr { font-size: 15px; }
}
@media (max-width: 480px) {
  .vc-wrap { padding: 60px 18px 60px; }
  .vc-name { font-size: 60px; }
  .vc-item { height: 80px; padding: 0 20px; font-size: 24px; }
  .vc-item-arr { font-size: 13px; }
}
</style>
</head>
<body>

<div class="page">
  <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="lcTail1" x1="138" y1="82" x2="778" y2="398" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#4070c8" stop-opacity="0.4"/>
        <stop offset="55%" stop-color="#4070c8" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#4070c8" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="lcGlow1" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
        <stop offset="12%" stop-color="#d0e4ff" stop-opacity="0.78"/>
        <stop offset="35%" stop-color="#7098e0" stop-opacity="0.22"/>
        <stop offset="70%" stop-color="#5080c8" stop-opacity="0.04"/>
        <stop offset="100%" stop-color="#5080c8" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="lcTail2" x1="1085" y1="615" x2="462" y2="308" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#7040c0" stop-opacity="0.38"/>
        <stop offset="55%" stop-color="#7040c0" stop-opacity="0.07"/>
        <stop offset="100%" stop-color="#7040c0" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="lcGlow2" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="white" stop-opacity="0.92"/>
        <stop offset="12%" stop-color="#e0d0ff" stop-opacity="0.76"/>
        <stop offset="35%" stop-color="#9868d8" stop-opacity="0.2"/>
        <stop offset="70%" stop-color="#7848c0" stop-opacity="0.04"/>
        <stop offset="100%" stop-color="#7848c0" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <path d="M 138 82 C 297 164 615 325 774 406 L 782 390 C 621 313 299 158 138 82 Z" fill="url(#lcTail1)"/>
    <path d="M 138 82 C 300 172 620 336 780 420 L 788 413 C 624 322 303 165 138 82 Z" fill="url(#lcTail1)" opacity="0.26"/>
    <ellipse cx="138" cy="82" rx="32" ry="32" fill="url(#lcGlow1)"/>
    <path d="M 1085 615 C 930 535 621 379 466 300 L 458 316 C 615 391 928 541 1085 615 Z" fill="url(#lcTail2)"/>
    <path d="M 1085 615 C 928 528 615 368 459 290 L 452 305 C 611 381 924 521 1085 615 Z" fill="url(#lcTail2)" opacity="0.24"/>
    <ellipse cx="1085" cy="615" rx="30" ry="30" fill="url(#lcGlow2)"/>
  </svg>

  <div class="vc-wrap">
    <div class="vc-name">평</div>
    <div class="vc-tagline">DJMAX · IIDX</div>

    <div class="vc-section">
      <div class="vc-section-title">글</div>
      <div class="vc-list">
        <a class="vc-item" href="#">
          <span>성과</span>
          <span class="vc-item-arr">→</span>
        </a>
        <a class="vc-item" href="#">
          <span>DJMAX 방송 관련글</span>
          <span class="vc-item-arr">→</span>
        </a>
      </div>
    </div>

    <div class="vc-section">
      <div class="vc-section-title">SNS</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <a class="vc-sns-banner banner-a" href="https://x.com/elcleardan" target="_blank">
          <span class="vc-banner-text">흥</span>
        </a>
        <a class="vc-sns-banner banner-b" href="https://x.com/notelcleardan" target="_blank">
          <span class="vc-banner-text">평</span>
        </a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
