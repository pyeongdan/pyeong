name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so page dates are accurate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: Install dependencies
        run: npm ci && chmod +x quartz/bootstrap-cli.mjs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Patch graph link visibility
        run: |
          TS_FILE=".quartz/plugins/graph/src/components/scripts/graph.inline.ts"

          if [ ! -f "$TS_FILE" ]; then
            echo "ERROR: TS file not found at $TS_FILE" && exit 1
          fi

          sed -i 's/color: lightgray,$/color: gray,/' "$TS_FILE"
          sed -i 's/linkData\.active ? gray : lightgray/linkData.active ? gray : gray/' "$TS_FILE"
          sed -i 's/alpha: l\.alpha, width: 1,/alpha: l.alpha, width: 2,/' "$TS_FILE"
          echo "TS patched"

          cd .quartz/plugins/graph && npm run build
          echo "Graph plugin rebuilt from patched source"

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
