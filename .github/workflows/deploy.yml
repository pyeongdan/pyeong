name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so page dates are accurate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: Install dependencies
        run: npm ci && chmod +x quartz/bootstrap-cli.mjs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Patch graph link visibility
        run: |
          TS_FILE=".quartz/plugins/graph/src/components/scripts/graph.inline.ts"
          JS_FILE=".quartz/plugins/graph/dist/components/index.js"

          # Patch TypeScript source
          if [ -f "$TS_FILE" ]; then
            sed -i 's/color: lightgray,$/color: gray,/' "$TS_FILE"
            sed -i 's/linkData\.active ? gray : lightgray/linkData.active ? gray : gray/' "$TS_FILE"
            sed -i 's/alpha: l\.alpha, width: 1,/alpha: l.alpha, width: 2,/' "$TS_FILE"
            echo "TS patched"
          fi

          # Patch minified dist JS (variable names: lightgray=te, gray=ee)
          if [ -f "$JS_FILE" ]; then
            # Initial link color in linkRenderData.push
            sed -i 's/color:te,alpha:1,active:!1/color:ee,alpha:1,active:!1/g' "$JS_FILE"
            # renderLinks: inactive link color
            sed -i 's/\.active?ee:te/\.active?ee:ee/g' "$JS_FILE"
            # stroke width in animate loop
            sed -i 's/width:1,color:v\.color/width:2,color:v.color/g' "$JS_FILE"
            echo "=== Verify dist patch ==="
            grep -o "color:ee,alpha:1\|color:te,alpha:1\|width:1,color:v\|width:2,color:v\|active?ee:te\|active?ee:ee" "$JS_FILE" || true
          fi

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
