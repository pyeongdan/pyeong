name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so page dates are accurate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: Install dependencies
        run: npm ci && chmod +x quartz/bootstrap-cli.mjs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Patch graph link visibility
        run: |
          TS_FILE=".quartz/plugins/graph/src/components/scripts/graph.inline.ts"
          JS_FILE=".quartz/plugins/graph/dist/components/index.js"
          patch_file() {
            local f="$1"
            if [ -f "$f" ]; then
              sed -i 's/color: lightgray,/color: gray,/g' "$f"
              sed -i 's/active?ee:te/active?ee:ee/g' "$f"
              sed -i 's/active ? gray : lightgray/active ? gray : gray/g' "$f"
              sed -i 's/width: 1, color/width: 2, color/g' "$f"
              sed -i 's/width:1,color/width:2,color/g' "$f"
              echo "Patched: $f"
            else
              echo "NOT FOUND: $f"
            fi
          }
          patch_file "$TS_FILE"
          patch_file "$JS_FILE"

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
